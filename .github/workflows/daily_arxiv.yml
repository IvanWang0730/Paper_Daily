name: Daily ArXiv RecSys Bot

on:
  # 1. 定时触发
  schedule:
    # 这里的 cron 是 UTC 时间。
    # 0 0 * * * 表示每天 UTC 时间 0:00 运行 (对应北京时间早上 8:00)
    - cron: '0 0 * * *'
  
  # 2. 允许手动触发 (方便你在 GitHub 网页端直接点击运行测试)
  workflow_dispatch:

jobs:
  run-arxiv-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests PyPDF2

    - name: Run Daily Script
      # 在这里注入 GitHub Secrets 作为环境变量
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        # LLM_BASE_URL 和 LLM_MODEL 如果没有在代码中写死，也可以在这里注入
      run: |
        python main.py

    - name: Commit and Push Changes
      run: |
        # 1. 配置虚拟 Git 机器人的身份
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 2. 把新生成的 PDF 和报告加入到暂存区
        git add arxiv_papers/ daily_reports/
        
        # 3. 检查是否有新文件，有的话就提交并推送
        if ! git diff --cached --quiet; then
          git commit -m "🤖 自动更新：下载最新论文及日报 [$(date +'%Y-%m-%d')]"
          git push
          echo "✅ 成功将最新文件推送到代码仓库！"
        else
          echo "📝 没有检测到新文件，跳过推送。"
        fi
